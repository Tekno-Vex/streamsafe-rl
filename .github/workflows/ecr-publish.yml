name: Build and Push to AWS ECR

# This triggers the pipeline automatically when code is pushed/merged to main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Builds the Go Ingestion container and pushes to ECR
      - name: Build, tag, and push Ingestion Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: streamsafe-ingestion
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./ingestion
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # Builds the Python Moderation container and pushes to ECR
      - name: Build, tag, and push Moderation Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: streamsafe-moderation
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./moderation
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG